<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Gallery | AI Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin:0; font-family: Arial, sans-serif; background: #f4f6f9; }
        .sidebar { width: 240px; height: 100vh; background: #111827; color: #fff; position: fixed; padding: 2rem 1rem; }
        .sidebar h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 2rem; text-align: center; }
        .sidebar a { display: block; color: #fff; padding: 12px 15px; text-decoration: none; margin: 5px 0; border-radius: 6px; transition: 0.3s; }
        .sidebar a:hover { background: #374151; }
        .main { margin-left: 260px; padding: 2rem; }
        h1 { margin-bottom: 1.5rem; font-weight: 700; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th, td { padding: 12px 15px; border-bottom: 1px solid #ddd; text-align: left; vertical-align: middle; }
        th { background: #6366f1; color: #fff; font-weight: 600; }
        tbody tr:nth-child(even) { background: #f9fafb; }
        .btn-sm { padding: 6px 12px; border-radius: 6px; font-size: 14px; font-weight: 500; }
        .btn-warning { background: #f59e0b; color: #fff; }
        .btn-warning:hover { background: #d97706; color: #fff; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #b91c1c; color: #fff; }
        .btn-primary { background: #6366f1; color: #fff; margin-bottom: 1rem; }
        .btn-primary:hover { background: #4f46e5; color: #fff; }
        img { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Admin</h2>
    <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
    <a href="{{ url_for('admin_gallery') }}">Gallery</a>
    <a href="#">Articles</a>
    <a href="#">Events</a>
    <a href="#">Users</a>
    <a href="#">Logout</a>
</div>

<div class="main">
    <h1>Admin Gallery</h1>
    <a href="{{ url_for('add_gallery') }}" class="btn btn-primary">
        <i class="fas fa-plus"></i> Add New Image
    </a>

    <table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Image</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% if gallery %}
                {% for item in gallery %}
                    <tr>
                        <td>{{ item['id'] }}</td>
                        <td>{{ item['title'] }}</td>
                        <td>{{ item['description'] }}</td>
                        <td><img src="{{ url_for('static', filename='uploads/gallery/' + item['image']) }}" alt="Gallery Image"></td>
                        <td>
                            <a href="{{ url_for('edit_gallery', id=item['id']) }}" class="btn btn-sm btn-warning">
                                <i class="fas fa-edit"></i> Edit
                            </a>
                            <form action="{{ url_for('delete_gallery', id=item['id']) }}" method="POST" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">
                                    <i class="fas fa-trash"></i> Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                {% endfor %}
            {% else %}
                <tr>
                    <td colspan="5" class="text-center">No images found.</td>
                </tr>
            {% endif %}
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
