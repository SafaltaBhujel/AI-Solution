<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Forgot Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="container">
    <div class="form-box">
      <div class="icon-header">🔑</div>
      <h2>Forgot Password</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST">
        <label for="user_identifier">Enter your username or email</label>
        <input type="text" name="identifier" id="user_identifier" placeholder="Username or Email" required />


        <button type="submit">Send Reset Link</button>
      </form>

      <p class="switch-link">
        Back to <a href="{{ url_for('login') }}">Login</a>
      </p>
    </div>
  </div>
</body>
</html>
