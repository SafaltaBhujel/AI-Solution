<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password</title>
  <style>
    /* ================================
       GLOBAL STYLES
    ================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .form-box {
      background: #fff;
      padding: 30px 35px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      width: 100%;
      text-align: center;
    }

    .icon-header {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: #667eea;
    }

    h2 {
      margin-bottom: 20px;
      font-weight: 600;
      color: #333;
    }

    label {
      display: block;
      margin: 12px 0 5px;
      text-align: left;
      color: #555;
      font-weight: 500;
    }

    input[type="text"], input[type="email"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      outline: none;
      font-size: 0.95rem;
      transition: 0.3s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus {
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102,126,234,0.5);
    }

    button[type="submit"] {
      background: #667eea;
      color: #fff;
      padding: 12px;
      border: none;
      width: 100%;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 15px;
      transition: 0.3s;
    }

    button[type="submit"]:hover {
      background: #5564d0;
    }

    .switch-link {
      margin-top: 20px;
      font-size: 0.9rem;
    }

    .switch-link a {
      color: #667eea;
      font-weight: 500;
      text-decoration: none;
      transition: 0.3s;
    }

    .switch-link a:hover {
      color: #5564d0;
    }

    .alert {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .alert.success {
      background: #e0f8e9;
      color: #2e7d32;
    }

    .alert.error {
      background: #fdecea;
      color: #c62828;
    }

    /* Responsive */
    @media(max-width: 480px) {
      .form-box {
        padding: 20px;
      }
      h2 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-box">
      <div class="icon-header">🔑</div>
      <h2>Forgot Password</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST">
        <label for="user_identifier">Enter your username or email</label>
        <input type="text" name="identifier" id="user_identifier" placeholder="Username or Email" required />

        <button type="submit">Send Reset Link</button>
      </form>

      <p class="switch-link">
        Back to <a href="{{ url_for('login') }}">Login</a>
      </p>
    </div>
  </div>
</body>
</html>
