<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin:0; font-family: Arial, sans-serif; background: #f4f6f9; }
        .sidebar { width:240px; height:100vh; background:#111827; color:#fff; position:fixed; padding:2rem 1rem; }
        .sidebar h2 { text-align:center; margin-bottom:2rem; }
        .sidebar a { display:block; color:#fff; padding:12px 15px; margin:5px 0; text-decoration:none; border-radius:6px; transition:0.3s; }
        .sidebar a:hover { background:#374151; }
        .main { margin-left:260px; padding:2rem; }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Admin Panel</h2>
        <a href="{{ url_for('admin_dashboard') }}"><i class="fas fa-home"></i> Dashboard</a>
        <a href="{{ url_for('view_contact_messages') }}"><i class="fas fa-envelope"></i> Customer Inquiry</a>
        <a href="{{ url_for('admin_articles') }}"><i class="fas fa-newspaper"></i> Articles</a>
        <a href="{{ url_for('admin_events') }}"><i class="fas fa-calendar-alt"></i> Events</a>
        <a href="{{ url_for('gallery') }}"><i class="fas fa-image"></i> Gallery</a>
        <a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <!-- Main content -->
    <div class="main">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
