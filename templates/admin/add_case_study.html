<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Case Study</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 700px;
            margin: 50px auto;
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #ff6ec7;
            margin-bottom: 30px;
        }
        form input, form select, form textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #6ec1ff;
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.3s;
        }
        form input:focus, form select:focus, form textarea:focus {
            outline: none;
            border-color: #ff6ec7;
            box-shadow: 0 0 10px rgba(255,110,199,0.3);
        }
        form button {
            width: 100%;
            background: linear-gradient(135deg, #ff6ec7, #6ec1ff);
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        form button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,110,199,0.3);
        }
        .flash-messages {
            list-style: none;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 12px;
            background-color: #ffe0f0;
            color: #c70077;
            text-align: center;
            font-weight: 600;
        }
        @media(max-width: 600px) {
            .container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Add New Case Study</h1>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul class="flash-messages">
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
            </ul>
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('add_case_study') }}" method="POST" enctype="multipart/form-data">
            <input type="text" name="title" placeholder="Case Study Title" required>
            <input type="text" name="category" placeholder="Category" required>
            <textarea name="description" rows="6" placeholder="Detailed Description" required></textarea>
            <label for="image">Upload Image:</label>
            <input type="file" name="image" accept="image/*">
            <button type="submit"><i class="fas fa-plus"></i> Add Case Study</button>
        </form>
    </div>
</body>
</html>
