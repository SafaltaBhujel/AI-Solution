<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Gallery Item | Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: #111827;
            color: #fff;
            position: fixed;
            top: 0;
            left: 0;
            padding: 2rem 1rem;
        }

        .sidebar h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
        }

        .sidebar a {
            display: block;
            color: #fff;
            padding: 12px 15px;
            text-decoration: none;
            margin: 5px 0;
            border-radius: 6px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #374151;
        }

        /* Main content */
        .main {
            margin-left: 260px;
            padding: 2rem;
        }

        h1 {
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        /* Form styling */
        .form-group {
            margin-bottom: 1rem;
        }

        label {
            font-weight: 600;
        }

        input[type="text"],
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-top: 5px;
        }

        button {
            background: #6366f1;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #4f46e5;
        }

        img.preview {
            margin-top: 10px;
            max-width: 200px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Admin Panel</h2>
    <a href="{{ url_for('admin_dashboard') }}"><i class="fas fa-home"></i> Dashboard</a>
    <a href="{{ url_for('gallery') }}"><i class="fas fa-image"></i> Gallery</a>
    <a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- Main content -->
<div class="main">
    <h1>Edit Gallery Item</h1>
    <form action="{{ url_for('edit_gallery', id=item['id']) }}" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{ item['title'] }}" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4" required>{{ item['description'] }}</textarea>
        </div>

        <div class="form-group">
            <label for="image">Current Image</label><br>
            <img src="{{ url_for('static', filename='uploads/' + item['image']) }}" alt="Gallery Image" class="preview">
        </div>

        <div class="form-group">
            <label for="image">Change Image</label>
            <input type="file" id="image" name="image">
        </div>

        <button type="submit"><i class="fas fa-save"></i> Update</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
