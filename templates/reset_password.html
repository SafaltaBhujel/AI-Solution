<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="container">
    <div class="form-box">
      <div class="icon-header">🔒</div>
      <h2>Reset Password</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST">
        <label for="new_password">New Password</label>
        <input type="password" name="new_password" id="new_password" required placeholder="New Password" />

        <label for="confirm_password">Confirm Password</label>
        <input type="password" name="confirm_password" id="confirm_password" required placeholder="Confirm Password" />

        <button type="submit">Reset Password</button>
      </form>

      <p class="switch-link">
        Back to <a href="{{ url_for('login') }}">Login</a>
      </p>
    </div>
  </div>
</body>
</html>
