<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - Events Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#f4f6f9; }
    .sidebar { width:220px; height:100vh; background:#111827; color:#fff; position:fixed; padding:1rem; }
    .sidebar a { display:block; color:#fff; padding:10px; text-decoration:none; margin:5px 0; border-radius:6px; }
    .sidebar a:hover { background:#374151; }
    .main { margin-left:240px; padding:2rem; }
    h1 { margin-bottom:1rem; }
    table { width:100%; border-collapse:collapse; background:#fff; border-radius:8px; overflow:hidden; }
    th, td { padding:12px; border-bottom:1px solid #ddd; text-align:left; }
    th { background:#6366f1; color:#fff; }
    .btn { padding:6px 10px; border:none; border-radius:4px; font-size:14px; cursor:pointer; text-decoration:none; }
    .add-btn { background:#10b981; color:#fff; margin-bottom:1rem; display:inline-block; }
  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>Admin</h2>
  <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
  <a href="{{ url_for('admin_events') }}" style="background:#374151;">Events</a>
<a href="{{ url_for('articles') }}">Articles</a>
  <a href="{{ url_for('admin_feedback_page') }}">Feedback</a>
<a href="{{ url_for('manage_users') }}">Users</a>
  <a href="{{ url_for('logout') }}">Logout</a>
</div>

<!-- Main Content -->
<div class="main">
  <h1>Events Management</h1>
  <a href="{{ url_for('add_event') }}" class="btn add-btn"><i class="fa fa-plus"></i> Add New Event</a>
  <table>
    <thead>
      <tr>
        <th>ID</th><th>Title</th><th>Description</th><th>Date</th><th>Image</th>
      </tr>
    </thead>
    <tbody>
      {% for event in events %}
      <tr>
        <td>{{ event['id'] }}</td>
        <td>{{ event['title'] }}</td>
        <td>{{ event['description'] }}</td>
        <td>{{ event['event_date'] }}</td>
        <td>
          <img src="{{ url_for('static', filename='uploads/events/' + event['image']) }}" width="100">
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

</body>
</html>
