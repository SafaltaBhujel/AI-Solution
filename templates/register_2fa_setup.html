<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Set Up 2FA</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="container">
    <div class="form-box">
      <div class="icon-header">🔒</div>
      <h2>Set Up Two-Factor Authentication</h2>

      <p>Scan this QR code using your Google Authenticator app or similar:</p>

      {% if qr_code %}
        <img src="data:image/png;base64,{{ qr_code }}" alt="2FA QR Code" />
      {% endif %}

      <p>If unable to scan, manually enter this code in your app:</p>
      <strong>{{ secret }}</strong>

      <p>After setup, <a href="{{ url_for('login') }}">click here to log in</a>.</p>
    </div>
  </div>
</body>
</html>
