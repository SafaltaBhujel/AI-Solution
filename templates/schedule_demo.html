<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule a Demo - AI-Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f7f5f8;
      color: #3c1e2f;
    }
    header {
      background: #fff;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-weight: 700;
      font-size: 1.8rem;
      color: #e91e63;
    }
    nav a {
      margin-left: 1rem;
      text-decoration: none;
      color: #3c1e2f;
      font-weight: 500;
      transition: 0.3s;
    }
    nav a:hover { color: #e91e63; }
    main {
      max-width: 700px;
      margin: 4rem auto;
      padding: 2rem;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
    }
    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #e91e63;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    label {
      font-weight: 500;
      margin-bottom: 0.3rem;
    }
    input, select, textarea {
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
      width: 100%;
      transition: 0.3s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #e91e63;
      box-shadow: 0 0 8px rgba(233,30,99,0.3);
    }
    .btn-submit {
      background: linear-gradient(135deg,#ec407a,#d81b60);
      color: #fff;
      padding: 0.75rem 2rem;
      font-weight: 600;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
      text-align: center;
    }
    .btn-submit:hover {
      background: linear-gradient(135deg,#ff4081,#d81b60);
      transform: scale(1.05);
    }
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.9rem;
      color: #7c4d58;
      margin-top: 3rem;
    }
    @media(max-width:768px){
      main { margin: 2rem 1rem; padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">AI-Solutions</div>
    <nav>
      <a href="{{ url_for('landing') }}">Home</a>
      <a href="{{ url_for('login') }}">Log In</a>
      <a href="{{ url_for('register') }}">Register</a>
    </nav>
  </header>

  <main>
    <h1>Schedule a Demo</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" required placeholder="Your Name" />

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required placeholder="Your Email" />

      <label for="phone">Phone Number</label>
      <input type="text" id="phone" name="phone" required placeholder="Your Phone Number" />

      <label for="company">Company Name</label>
      <input type="text" id="company" name="company" placeholder="Company Name" />

      <label for="country">Country</label>
      <input type="text" id="country" name="country" placeholder="Country" />

      <label>I'm interested in:</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="interest" value="AI Assistant"> AI-powered Virtual Assistant</label>
        <label><input type="checkbox" name="interest" value="Demo"> Schedule a Demo</label>
        <label><input type="checkbox" name="interest" value="Events"> Join Events</label>
      </div>

      <label for="message">Additional Information</label>
      <textarea id="message" name="message" rows="3" placeholder="Any details you'd like to share"></textarea>

      <button type="submit" class="btn-submit">Submit</button>
    </form>
  </main>

  <footer>
    &copy; 2025 AI-Solutions. All rights reserved.
  </footer>
</body>
</html>
