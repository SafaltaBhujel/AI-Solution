<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Article | AI Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin:0; font-family:Arial, sans-serif; background:#f4f6f9; }

        /* Sidebar */
        .sidebar { width:240px; height:100vh; background:#111827; color:#fff; position:fixed; top:0; left:0; padding:2rem 1rem; }
        .sidebar h2 { font-size:1.6rem; font-weight:700; margin-bottom:2rem; text-align:center; }
        .sidebar a { display:block; color:#fff; padding:12px 15px; text-decoration:none; margin:5px 0; border-radius:6px; transition:0.3s; }
        .sidebar a:hover { background:#374151; }

        /* Main content */
        .main { margin-left:260px; padding:2rem; }
        h1 { margin-bottom:1.5rem; font-weight:700; }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Admin</h2>
    <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
    <a href="{{ url_for('admin_articles') }}" style="background:#374151;">Articles</a>
    <a href="#">Events</a>
    <a href="#">Manage Users</a>
    <a href="#">Logout</a>
</div>

<!-- Main content -->
<div class="main">
    <h1>Delete Article</h1>
    <p>Are you sure you want to delete the article <strong>{{ article['title'] }}</strong>?</p>

    <form method="POST" action="{{ url_for('delete_article', id=article['id']) }}">
        <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> Yes, Delete</button>
        <a href="{{ url_for('admin_articles') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
