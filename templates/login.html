<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<!-- reCAPTCHA v3 -->
<script src="https://www.google.com/recaptcha/api.js?render={{ site_key }}"></script>

<style>
  body {
    font-family: 'Inter', sans-serif;
    background: #f5f7fa;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
  .container {
    width: 100%;
    max-width: 400px;
    padding: 20px;
  }
  .form-box {
    background: #fff;
    border-radius: 12px;
    padding: 2rem;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  }
  .icon-header {
    display: flex;
    justify-content: center;
    margin-bottom: 1rem;
  }
  .icon-header svg {
    width: 64px;
    height: 64px;
    stroke: #555;
    background: #f0f2f7;
    border-radius: 50%;
    padding: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  h2 {
    text-align: center;
    margin-bottom: 1.5rem;
    color: #3a3f51;
  }
  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 0.95rem;
    transition: border 0.2s;
  }
  input:focus {
    outline: none;
    border-color: #4f46e5;
  }
  label {
    display: block;
    margin-bottom: 0.3rem;
    font-weight: 500;
    color: #555;
  }
  .forgot-link a {
    color: #e91e63;
    font-weight: 500;
    text-decoration: none;
    transition: color 0.2s;
  }
  .forgot-link a:hover {
    color: #c2185b;
  }
  button, .submit-btn {
    width: 100%;
    padding: 10px 0;
    margin-top: 10px;
    background: #4f46e5;
    color: #fff;
    font-size: 1rem;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s;
  }
  button:hover, .submit-btn:hover {
    background: #3730a3;
  }
  .google-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border: 1px solid #ddd;
    border-radius: 6px;
    text-decoration: none;
    color: #444;
    font-weight: 500;
    transition: background 0.2s;
  }
  .google-btn:hover {
    background: #f0f2f7;
  }
  .switch-link {
    text-align: center;
    margin-top: 1rem;
    font-size: 0.9rem;
    color: #333;
  }
  .switch-link a {
    color: #4f46e5;
    font-weight: 500;
    text-decoration: none;
  }
  .switch-link a:hover {
    text-decoration: underline;
  }
  .alert {
    padding: 0.6rem 1rem;
    margin-bottom: 1rem;
    border-radius: 6px;
    font-size: 0.9rem;
    color: #fff;
    background: #f44336;
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const form = document.querySelector('form');
  const submitBtn = form.querySelector('button[type="submit"]');

  form.addEventListener('submit', event => {
    event.preventDefault();
    submitBtn.disabled = true;

    grecaptcha.ready(() => {
      grecaptcha.execute('{{ site_key }}', { action: 'login' })
        .then(token => {
          document.getElementById('g-recaptcha-response').value = token;
          form.submit();
        })
        .catch(() => {
          alert('reCAPTCHA verification failed. Please try again.');
          submitBtn.disabled = false;
        });
    });
  });
});
</script>
</head>

<body>
<div class="container">
  <div class="form-box">
    <div class="icon-header">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <h2>Log In</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" novalidate autocomplete="off">
      <!-- Hidden fields to trick autofill -->
      <input type="text" name="fakeuser" style="display:none" autocomplete="off" />
      <input type="password" name="fakepass" style="display:none" autocomplete="off" />

      <label for="username">Username</label>
      <input id="username" name="username" placeholder="Username" required autocomplete="off" />

      <label for="password">Password</label>
      <input id="password" type="password" name="password" placeholder="Password" required autocomplete="new-password" />

      <div class="forgot-link" style="text-align:center; margin-bottom:1em;">
        <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
      </div>

      <input type="hidden" id="g-recaptcha-response" name="g-recaptcha-response" />
      <button type="submit">Login</button>
    </form>

    <div style="text-align:center; margin-top:15px;">
      <a href="{{ url_for('login_google') }}" class="google-btn">
        <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" style="width:20px; height:20px;" />
        Login with Google
      </a>
    </div>

    <p class="switch-link">
      New here? <a href="{{ url_for('register') }}">Register</a>
    </p>
  </div>
</div>
</body>
</html>
